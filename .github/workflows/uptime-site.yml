name: Static Site CI
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
jobs:
  site:
    name: Build status site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ github.token }}
      - name: Build site
        uses: upptime/uptime-monitor@v1.41.8
        with:
          command: "site"
        env:
          GH_PAT: ${{ github.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
      - name: Locate export dir
        run: find . -name "index.html" -path "*export*" 2>/dev/null | head; ls -la __sapper__ 2>/dev/null; find . -type d -name "export" 2>/dev/null | head
